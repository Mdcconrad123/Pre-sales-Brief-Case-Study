// ── CLAUDE ────────────────────────────────────────────────────────────────────
async function callClaude(system, user) {
  const res = await fetch("/.netlify/functions/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1600,
      system,
      messages: [{ role: "user", content: user }],
    }),
  });
  const data = await res.json();
  const text = data.content?.find(b => b.type === "text")?.text || "{}";
  try { return JSON.parse(text.replace(/```json\n?|```/g, "").trim()); }
  catch { return {}; }
}

// ── PIPELINE ──────────────────────────────────────────────────────────────────
async function runPipeline(account, onStep) {
  const isMissingGong  = account.id === "missingdata";
  const isFirstTime    = account.id === "newco";
  const isConflicting  = account.id === "globex";

  // Step 1: Pull data — instant, assembles local mock objects
  // Field-level gap detection runs here before prompts fire
  onStep("fetch");
  const rawData = JSON.stringify({ sf: account.salesforce, gong: account.gong });

  // ── FIELD-LEVEL GAP DETECTION ─────────────────────────────────────────────
  // Check each required field individually. Build a dataGaps array that
  // gets passed to the brief renderer. Each gap has: field, source, label, action.
  const sf = account.salesforce;
  const gongCalls = account.gong?.calls || [];

  const dataGaps = [];

  // Salesforce fields
  if (!sf.stage || sf.stage === "Unknown" || sf.stage === "N/A")
    dataGaps.push({ field: "deal_stage", source: "Salesforce", label: "Deal Stage",
      action: "Open the opportunity in Salesforce and set the current deal stage." });
  if (!sf.contacts || sf.contacts.length === 0)
    dataGaps.push({ field: "contacts", source: "Salesforce", label: "Contacts",
      action: "Add the prospect's contacts (name, title, email) to the Salesforce account." });
  if (!sf.history || sf.history.length === 0)
    dataGaps.push({ field: "activity_history", source: "Salesforce", label: "Activity History",
      action: "Log recent emails, calls, and meetings as activity records in Salesforce." });
  if (!sf.openOpps || sf.openOpps.length === 0)
    dataGaps.push({ field: "open_opportunities", source: "Salesforce", label: "Open Opportunities",
      action: "Create an opportunity record in Salesforce for this deal." });

  // Gong fields
  if (gongCalls.length === 0)
    dataGaps.push({ field: "call_highlights", source: "Gong", label: "Call Highlights",
      action: "Ensure calls with this account are being recorded in Gong. Check that the Gong bot is admitted to meetings." });
  else if (!gongCalls.some(c => c.highlights && c.highlights.length > 0))
    dataGaps.push({ field: "call_highlights", source: "Gong", label: "Call Highlights",
      action: "Calls are recorded but no highlights were extracted. Check that Gong highlight extraction is enabled for this account." });

  if (gongCalls.length === 0 || !gongCalls.some(c => typeof c.sentiment === "number"))
    dataGaps.push({ field: "sentiment_trends", source: "Gong", label: "Sentiment Trends",
      action: "Sentiment data requires recorded calls with Gong AI analysis enabled. No sentiment data is available for this account." });

  // Step 2: Synthesize — fire both Claude calls in parallel for speed
  onStep("synthesize");
  const [history_analysis, recommendations] = await Promise.all([
    // Call A: extract facts + analyze history in one shot
    callClaude(
      `You are a senior sales intelligence analyst. Produce a thorough historical analysis. The richer the data, the more detailed your output.

FIRST-TIME PROSPECT OVERRIDE: If first_time_prospect = true OR calls = [] AND activity_history = [], set key_signals = [], risks_from_history = [], sentiment_score = null, sentiment_label = 'First call — no history', and account_summary to 1-2 sentences confirming only what Salesforce shows.

Otherwise output JSON with:
- sentiment_score: float -1.0 to 1.0 (recency-weighted)
- sentiment_label: string (e.g. 'Consistently Positive')
- account_summary: 3-4 sentences on company situation and deal health
- call_progression: 2-4 sentences on how the relationship evolved
- key_signals: array — every meaningful signal, with direct quotes. Min 4.
- risks_from_history: array — every risk and stakeholder gap. Min 2.
- objections_raised: array — every objection the prospect actually voiced.
- data_warnings: array — always populated when edge cases are present.

Missing Gong: set sentiment = null, omit call_progression, note in warnings.
Mixed signals (positive Gong + At Risk SF): surface both explicitly.
No markdown fences. Return raw JSON only.`,
      `scenario: "${account.scenario.label}"\nfirst_time_prospect: ${isFirstTime}\ncalls_exist: ${account.gong.calls.length > 0}\nactivity_exists: ${account.salesforce.history.length > 0}\n\n${rawData}`
    ),
    // Call B: generate forward-looking recommendations directly from raw data
    callClaude(
      `You are an expert B2B sales coach. Be concise — AE reads this in 2 minutes. Every recommendation must be grounded in the data. No generic advice.

FIRST-TIME PROSPECT OVERRIDE: If first_time_prospect = true, set:
  call_goal: 'Run discovery — understand situation and fit before pitching.'
  talking_points: []
  suggested_agenda: ['Opening: confirm agenda', 'Discovery: open-ended questions on process and pain points', 'Next step: agree follow-up']
  likely_objections: []

Otherwise output JSON with:
- call_goal: 1 sentence — single most important thing to accomplish
- win_condition: 1 sentence — what a successful outcome looks like
- biggest_risk: 1 sentence — most likely thing to derail the call
- suggested_agenda: array of 3 items max, format 'Topic: rationale'
- talking_points: array of 3 strings max, each grounded in a specific quote
- likely_objections: [ { objection, response } ] — 2 items max
- opening_line: 1 sentence referencing the last interaction specifically

Missing Gong: base talking points on SF activity only.
Mixed signals: orient call_goal around resolving the discrepancy.
No markdown fences. Return raw JSON only.`,
      `scenario: "${account.scenario.label}"\nfirst_time_prospect: ${isFirstTime}\ncalls_exist: ${account.gong.calls.length > 0}\nactivity_exists: ${account.salesforce.history.length > 0}\n\n${rawData}`
    ),
  ]);

  // Steps 3 & 4 resolve instantly once Promise.all completes
  onStep("compile");
  onStep("deliver");

  // ── NORMALIZE API OUTPUTS — coerce all array fields to string arrays ─────────
  const normalizeStrArray = (arr) => (arr || []).map(x =>
    typeof x === "string" ? x :
    typeof x === "object" && x !== null ? (x.signal || x.text || x.value || x.detail || x.point || x.note || JSON.stringify(x)) : String(x ?? "")
  );
  if (history_analysis) {
    history_analysis.key_signals        = normalizeStrArray(history_analysis.key_signals);
    history_analysis.risks_from_history = normalizeStrArray(history_analysis.risks_from_history);
    history_analysis.objections_raised  = normalizeStrArray(history_analysis.objections_raised);
    history_analysis.data_warnings      = normalizeStrArray(history_analysis.data_warnings);
    if (typeof history_analysis.account_summary  === "object") history_analysis.account_summary  = JSON.stringify(history_analysis.account_summary);
    if (typeof history_analysis.call_progression === "object") history_analysis.call_progression = JSON.stringify(history_analysis.call_progression);
    if (typeof history_analysis.sentiment_label  === "object") history_analysis.sentiment_label  = JSON.stringify(history_analysis.sentiment_label);
  }
  if (recommendations) {
    recommendations.talking_points   = normalizeStrArray(recommendations.talking_points);
    recommendations.suggested_agenda = normalizeStrArray(recommendations.suggested_agenda);
    if (typeof recommendations.call_goal     === "object") recommendations.call_goal     = JSON.stringify(recommendations.call_goal);
    if (typeof recommendations.win_condition === "object") recommendations.win_condition = JSON.stringify(recommendations.win_condition);
    if (typeof recommendations.biggest_risk  === "object") recommendations.biggest_risk  = JSON.stringify(recommendations.biggest_risk);
    if (typeof recommendations.opening_line  === "object") recommendations.opening_line  = JSON.stringify(recommendations.opening_line);
    // Normalize likely_objections — ensure each item has string objection+response
    recommendations.likely_objections = (recommendations.likely_objections || []).map(o =>
      typeof o === "string" ? { objection: o, response: "" } :
      typeof o === "object" && o !== null ? { objection: String(o.objection || o.they_say || o.text || ""), response: String(o.response || o.you_say || o.answer || "") } :
      { objection: String(o), response: "" }
    );
  }

  return { history_analysis, recommendations, isMissingGong, isFirstTime, isConflicting, dataGaps };
}

const sentimentColor = s =>
  s >= 0.5 ? "#15803d" : s >= 0.1 ? "#4d7c0f" : s >= -0.1 ? "#b45309" : "#b91c1c";
const sentimentLabel = s =>
  s >= 0.5 ? "Positive" : s >= 0.1 ? "Leaning Positive" : s >= -0.1 ? "Neutral" : s >= -0.4 ? "Cautious" : "Negative";
const sentimentDot = s =>
  s >= 0.5 ? "#22c55e" : s >= 0.1 ? "#84cc16" : s >= -0.1 ? "#f59e0b" : s >= -0.4 ? "#f97316" : "#ef4444";

const STEPS = [
  { key: "fetch",     label: "Data Pull",     sub: "Salesforce + Gong" },
  { key: "synthesize",label: "Synthesize",    sub: "Analyze history + signals" },
  { key: "compile",   label: "Generate",      sub: "Talking points + agenda" },
  { key: "deliver",   label: "Compile Brief", sub: "Format for Slack delivery" },
];

    <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "24px 0 16px" }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: ".07em", whiteSpace: "nowrap" }}>{label}</div>

      <div style={{ flex: 1, height: 1, background: "#e5e7eb" }} />
    </div>

}

// ── CARD ──────────────────────────────────────────────────────────────────────
function Card({ title, subtitle, children, warning }) {
  return (
    <div style={{ border: "1px solid #e5e7eb", borderRadius: 8, overflow: "hidden", marginBottom: 12 }}>
      <div style={{ padding: "14px 18px 12px", borderBottom: children ? "1px solid #f3f4f6" : "none" }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: "#111827", marginBottom: subtitle ? 3 : 0 }}>{title}</div>
        {subtitle && <div style={{ fontSize: 12, color: "#9ca3af" }}>{subtitle}</div>}
      </div>
      {warning && (
        <div style={{ background: "#fffbeb", borderBottom: "1px solid #fde68a", padding: "8px 18px", display: "flex", gap: 8, alignItems: "flex-start" }}>
          <span style={{ flexShrink: 0 }}>⚠️</span>
          <span style={{ fontSize: 12, color: "#92400e" }}>{warning}</span>
        </div>
      )}
      {children && <div style={{ padding: "14px 18px" }}>{children}</div>}
    </div>
  );
}

function BulletList({ items, color = "#374151", dotColor = "#d1d5db" }) {
  return (
    <ul style={{ listStyle: "none", margin: 0, padding: 0 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "flex", gap: 8, marginBottom: 7, alignItems: "flex-start" }}>
          <div style={{ width: 6, height: 6, borderRadius: "50%", background: dotColor, flexShrink: 0, marginTop: 6 }} />
          <span style={{ fontSize: 13, color, lineHeight: 1.55 }}>{typeof item === "object" && item !== null ? (item.signal || item.text || item.value || item.detail || JSON.stringify(item)) : String(item ?? "")}</span>
        </li>
      ))}
    </ul>
  );
}

  const { history_analysis, recommendations, isMissingGong, isFirstTime, isConflicting, dataGaps } = results;

  const sc = typeof history_analysis?.sentiment_score === "number" ? history_analysis.sentiment_score : 0;
  const lastActivity = account.salesforce.history[0] || null;

  return (
    <div style={{ fontFamily: "'Inter', system-ui, sans-serif", color: "#111827", maxWidth: 720, margin: "0 auto" }}>

      {/* ── TOP META BAR ── */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: sentimentDot(sc), flexShrink: 0 }} />
          <span style={{ fontSize: 13, fontWeight: 600, color: sentimentColor(sc) }}>{sentimentLabel(sc)}</span>
          <span style={{ color: "#d1d5db", fontSize: 13 }}>·</span>
          <span style={{ fontSize: 13, color: "#6b7280" }}>Sentiment {sc.toFixed(1)}</span>
        </div>
        <span style={{ color: "#d1d5db" }}>·</span>
        <span style={{ fontSize: 13, color: "#6b7280" }}>
          <strong style={{ color: "#374151" }}>Primary motion:</strong> {recommendations.call_goal}
        </span>
        {(isMissingGong || isConflicting || isFirstTime) && (
          <>

      {dataGaps && dataGaps.length > 0 && (

          <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "14px 16px", marginBottom: 12 }}>

                  <th style={{ textAlign: "left", padding: "4px 10px 6px 8px", color: "#92400e", fontWeight: 700, width: "14%" }}>Source</th>
                  <th style={{ textAlign: "left", padding: "4px 0 6px 8px", color: "#92400e", fontWeight: 700 }}>What to Do</th>

              <tbody>
                {dataGaps.map((gap, i) => (
                  <tr key={gap.field} style={{ borderBottom: i < dataGaps.length - 1 ? "1px solid #fef3c7" : "none" }}>

      {/* Footer */}
      <div style={{ marginTop: 20, paddingTop: 14, borderTop: "1px solid #e5e7eb", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ fontSize: 12, color: "#9ca3af" }}>⚡ Generated by PreCall Bot · {new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })} · 4 prompts chained</div>
        <div style={{ display: "flex", gap: 6 }}>
          {["👍 Helpful", "📌 Pin", "🔗 Share"].map(a => (
            <button key={a} style={{ background: "white", border: "1px solid #e5e7eb", borderRadius: 5, padding: "4px 10px", fontSize: 12, color: "#6b7280", cursor: "pointer", fontFamily: "inherit", fontWeight: 500 }}>{a}</button>

      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [selectedId, setSelectedId] = useState(null);
  const [activeStep, setActiveStep] = useState(null);
  const [doneSteps, setDoneSteps] = useState([]);
  const [results, setResults] = useState(null);
  const [tab, setTab] = useState("slack");
  const [error, setError] = useState(null);
  const [hasRun, setHasRun] = useState(false);

  const account = ACCOUNTS.find(a => a.id === selectedId);
  const isRunning = !!activeStep;

  async function run() {
    if (!account) return;
    setResults(null); setError(null); setDoneSteps([]); setTab("slack"); setHasRun(true);
    const stepOrder = ["fetch", "synthesize", "compile", "deliver"];
    try {
      const res = await runPipeline(account, step => {
        const idx = stepOrder.indexOf(step);
        setActiveStep(step);
        setDoneSteps(stepOrder.slice(0, idx));
      });
      setDoneSteps(stepOrder);
      setActiveStep(null);
      setResults(res);
    } catch (e) {
      setError(e.message);
      setActiveStep(null);
    }
  }

  return (
    <div style={{ minHeight: "100vh", background: "#f9fafb", color: "#111827", fontFamily: "'Inter', system-ui, sans-serif", display: "flex", flexDirection: "column" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f9fafb; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        .acc { cursor: pointer; padding: 11px 12px; border-radius: 7px; border: 1.5px solid #e5e7eb; background: white; transition: all .15s; }
        .acc:hover { border-color: #93c5fd; background: #f0f9ff; }
        .acc.sel { border-color: #2563eb; background: #eff6ff; }

        .run-btn { width: 100%; padding: 11px; border: none; border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; background: #2563eb; color: white; transition: all .15s; }
        .run-btn:hover:not(:disabled) { background: #1d4ed8; }
        .run-btn:disabled { opacity: .4; cursor: not-allowed; }

        .tab { padding: 7px 14px; border: none; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; background: transparent; color: #6b7280; }
        .tab.on { background: #eff6ff; color: #2563eb; font-weight: 600; }
        .tab:hover:not(.on) { color: #374151; background: #f3f4f6; }

        .step-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 5px; margin-bottom: 2px; }
        .spin { animation: spin 1s linear infinite; display: inline-block; }
        .pulse { animation: pulse 1.2s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
        .fadein { animation: fadein .3s ease-out; }
        @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; }
      `}</style>

      {/* ── LOCAL FILE WARNING BANNER ── */}
      {typeof window !== "undefined" && window.location.protocol === "file:" && (
        <div style={{ background: "#fffbeb", borderBottom: "1px solid #fde68a", padding: "9px 18px", display: "flex", alignItems: "center", gap: 10, fontSize: 12, color: "#92400e", flexShrink: 0 }}>
          <span style={{ fontWeight: 700, flexShrink: 0 }}>⚠ Running from a local file</span>
          <span style={{ color: "#b45309" }}>The Claude API will be blocked by your browser. To run this:</span>
          <span style={{ fontWeight: 600 }}>① Upload to <a href="https://tiiny.host" target="_blank" style={{ color: "#d97706" }}>tiiny.host</a> for an instant free URL</span>
          <span style={{ color: "#d1d5db" }}>or</span>
          <span style={{ fontWeight: 600 }}>② In Terminal: <code style={{ background: "#fef3c7", padding: "1px 6px", borderRadius: 3 }}>npx serve .</code> then open localhost:3000</span>
          <span style={{ color: "#d1d5db" }}>or</span>
          <span style={{ fontWeight: 600 }}>③ VS Code → right-click → Open with Live Server</span>
        </div>
      )}

      {/* ── HEADER ── */}
      <div style={{ background: "white", borderBottom: "1px solid #e5e7eb", padding: "13px 22px", display: "flex", alignItems: "center", flexShrink: 0 }}>
        <div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#111827" }}>⚡ Pre-Call Intelligence Agent</div>
          <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 1, fontWeight: 500 }}>Laurel AI Ops · 4 Scenarios</div>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 5 }}>
          {[["SF", "#0ea5e9"], ["GONG", "#7c3aed"], ["CLAUDE", "#059669"], ["→ SLACK", "#d97706"]].map(([s, c]) => (
            <span key={s} className="badge" style={{ background: `${c}12`, color: c, border: `1px solid ${c}25` }}>{s}</span>
          ))}
        </div>
      </div>

      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>

        {/* ── SIDEBAR ── */}
        <div style={{ width: 250, borderRight: "1px solid #e5e7eb", background: "white", padding: "16px 12px", display: "flex", flexDirection: "column", gap: 14, overflowY: "auto", flexShrink: 0 }}>
          <div>
            <div style={{ fontSize: 11, color: "#9ca3af", fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", marginBottom: 8 }}>Scenarios</div>
            {ACCOUNTS.map(a => (
              <div key={a.id} className={`acc ${selectedId === a.id ? "sel" : ""}`} style={{ marginBottom: 6 }}
                onClick={() => { setSelectedId(a.id); setResults(null); setDoneSteps([]); setActiveStep(null); setError(null); setHasRun(false); }}>
                <span className="badge" style={{ background: `${a.scenario.color}12`, color: a.scenario.color, border: `1px solid ${a.scenario.color}25`, marginBottom: 4, fontSize: 10 }}>{a.scenario.tag}</span>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#111827", marginBottom: 1 }}>{a.name}</div>
                <div style={{ fontSize: 12, color: "#6b7280" }}>{a.scenario.label}</div>
              </div>
            ))}
          </div>

          {account && (
            <div style={{ background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 7, padding: "10px 12px" }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af", letterSpacing: ".07em", textTransform: "uppercase", marginBottom: 5 }}>
                {account.scenario.tag === "Standard" ? "Scenario" : "Edge Case"}
              </div>
              <div style={{ fontSize: 12, color: "#374151", lineHeight: 1.6 }}>{account.scenario.description}</div>
            </div>
          )}

          <button className="run-btn" disabled={!selectedId || isRunning} onClick={run}>
            {isRunning ? "⟳  Running..." : "▶  Run Agent"}
          </button>

          <div>
            <div style={{ fontSize: 11, color: "#9ca3af", fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", marginBottom: 8 }}>Pipeline</div>
            {STEPS.map(step => {
              const done = doneSteps.includes(step.key), active = activeStep === step.key;
              return (
                <div key={step.key} className="step-row" style={{ background: done ? "#f0fdf4" : active ? "#eff6ff" : "transparent" }}>
                  <div style={{ width: 22, height: 22, borderRadius: 5, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, flexShrink: 0, background: done ? "#dcfce7" : active ? "#dbeafe" : "#f3f4f6", color: done ? "#16a34a" : active ? "#2563eb" : "#9ca3af", border: `1px solid ${done ? "#bbf7d0" : active ? "#bfdbfe" : "#e5e7eb"}` }}>
                    {done ? "✓" : active ? <span className="spin">◌</span> : "·"}
                  </div>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 600, color: done ? "#16a34a" : active ? "#2563eb" : "#6b7280" }}>{step.label}</div>
                    <div style={{ fontSize: 11, color: "#9ca3af" }}>{step.sub}</div>
                  </div>
                  {active && <div className="pulse" style={{ marginLeft: "auto", width: 5, height: 5, borderRadius: "50%", background: "#2563eb" }} />}
                </div>
              );
            })}
          </div>
        </div>

        {/* ── MAIN ── */}
        <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>

          {!selectedId && (
            <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8 }}>
              <div style={{ fontSize: 32, opacity: .15 }}>◈</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#6b7280" }}>Select a scenario to begin</div>
              <div style={{ fontSize: 13, color: "#9ca3af", textAlign: "center", maxWidth: 280, lineHeight: 1.6, marginTop: 4 }}>
                Choose a normal report or one of three edge cases to see how the agent handles each differently.
              </div>
            </div>
          )}

          {selectedId && !results && !isRunning && (!error || !hasRun) && (
            <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10 }}>
              <div style={{ fontSize: 26 }}>▶</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#6b7280" }}>Ready</div>
              <div style={{ fontSize: 13, color: "#9ca3af", textAlign: "center", maxWidth: 300, lineHeight: 1.7 }}>
                Click <strong style={{ color: "#2563eb" }}>Run Agent</strong> to pull mock data and chain through 4 Claude prompts automatically.
              </div>
              <div style={{ background: `${account?.scenario.color}10`, border: `1px solid ${account?.scenario.color}25`, borderRadius: 6, padding: "7px 14px", fontSize: 12, color: account?.scenario.color, fontWeight: 600, marginTop: 4 }}>
                {account?.scenario.tag}: {account?.scenario.label}
              </div>
            </div>
          )}

          {isRunning && (
            <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10 }}>
              <div style={{ position: "relative", width: 44, height: 44 }}>
                <div style={{ width: 44, height: 44, borderRadius: "50%", border: "2px solid #e5e7eb", borderTopColor: "#2563eb" }} className="spin" />
                <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>⚡</div>
              </div>
              <div style={{ fontSize: 13, fontWeight: 500, color: "#6b7280" }}>
                {activeStep === "fetch"      ? "Pulling Salesforce & Gong data..."
                 : activeStep === "synthesize" ? "Synthesizing history and signals..."
                 : activeStep === "compile"    ? "Generating talking points and agenda..."
                 : "Compiling final brief for Slack..."}
              </div>
            </div>
          )}

          {error && hasRun && (
            <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: 18, color: "#991b1b" }}>
              <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 8 }}>⚠ {error === "Failed to fetch" ? "Browser security is blocking the API call" : error}</div>
              {error === "Failed to fetch" && (
                <div style={{ fontSize: 13, lineHeight: 1.7, color: "#7f1d1d" }}>
                  <p style={{ marginBottom: 8 }}>This happens when the file is opened directly from your desktop (<code style={{ background: "#fee2e2", padding: "1px 5px", borderRadius: 3 }}>file://</code>). Browsers block cross-origin API requests from local files for security.</p>
                  <p style={{ fontWeight: 600, marginBottom: 6 }}>Two easy fixes:</p>
                  <ol style={{ paddingLeft: 20, display: "flex", flexDirection: "column", gap: 6 }}>
                    <li><strong>Serve it locally:</strong> Open Terminal, run <code style={{ background: "#fee2e2", padding: "1px 5px", borderRadius: 3 }}>npx serve .</code> in the folder containing this file, then open <code style={{ background: "#fee2e2", padding: "1px 5px", borderRadius: 3 }}>http://localhost:3000</code></li>
                    <li><strong>Use VS Code Live Server:</strong> Right-click the file in VS Code → "Open with Live Server"</li>
                    <li><strong>Upload to any host:</strong> Drag this file to <a href="https://tiiny.host" target="_blank" style={{ color: "#dc2626" }}>tiiny.host</a> for a free instant URL — no account needed</li>
                  </ol>
                  <p style={{ marginTop: 10, color: "#9ca3af", fontSize: 12 }}>Note: When Laurel opens this from a hosted URL (e.g. sent via email and hosted online), it will work immediately with no changes needed.</p>
                </div>
              )}
            </div>
          )}

          {results && (
            <div className="fadein">
              {/* Tabs */}
              <div style={{ display: "flex", gap: 4, marginBottom: 16, paddingBottom: 12, borderBottom: "1px solid #e5e7eb" }}>
                {[["slack", "💬 Slack Output"], ["source", "🗄 Source Data"], ["raw", "⚙ Raw Outputs"]].map(([k, l]) => (
                  <button key={k} className={`tab ${tab === k ? "on" : ""}`} onClick={() => setTab(k)}>{l}</button>
                ))}
              </div>

              {tab === "slack" && (
                <div>
                  <div style={{ fontSize: 11, color: "#9ca3af", marginBottom: 10, fontWeight: 600, letterSpacing: ".04em", textTransform: "uppercase" }}>
                    Simulated output — what {account.ae} sees in #sales-call-briefs
                  </div>
                  <SlackShell account={account} results={results} />
                </div>
              )}

              {tab === "source" && (
                <div>
                  <div style={{ background: "white", border: "1px solid #e5e7eb", borderRadius: 8, padding: "16px 18px", marginBottom: 12 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#0ea5e9", marginBottom: 10, textTransform: "uppercase", letterSpacing: ".06em", fontSize: 11 }}>☁ Salesforce</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                      {[["Account", account.salesforce.account], ["Industry", account.salesforce.industry], ["Stage", account.salesforce.stage], ["Deal Size", account.salesforce.dealSize], ["Risk", account.salesforce.dealRisk], ["Employees", account.salesforce.employees]].map(([k, v]) => (
                        <div key={k} style={{ background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 5, padding: "7px 10px" }}>
                          <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 1, fontWeight: 600 }}>{k.toUpperCase()}</div>
                          <div style={{ fontSize: 13, color: "#111827", fontWeight: 500 }}>{v}</div>
                        </div>
                      ))}
                    </div>
                    {account.salesforce.history.length > 0 ? (
                      <>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 7 }}>Activity History</div>
                        {account.salesforce.history.map((h, i) => (
                          <div key={i} style={{ background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 5, padding: "7px 10px", marginBottom: 5 }}>
                            <div style={{ display: "flex", gap: 6, marginBottom: 2 }}>
                              <span className="badge" style={{ background: "#e0f2fe", color: "#0369a1", fontSize: 10 }}>{h.type}</span>
                              <span style={{ fontSize: 11, color: "#6b7280", fontWeight: 500 }}>{h.date}</span>
                            </div>
                            <div style={{ fontSize: 12, color: "#374151" }}>{h.note}</div>
                          </div>
                        ))}
                      </>
                    ) : (
                      <div style={{ fontSize: 12, color: "#9ca3af", fontStyle: "italic" }}>No activity history.</div>
                    )}
                  </div>

                  <div style={{ background: "white", border: "1px solid #e5e7eb", borderRadius: 8, padding: "16px 18px" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#7c3aed", textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 10 }}>🎙 Gong</div>
                    {account.gong.calls.length === 0 ? (
                      <div style={{ fontSize: 12, color: "#9ca3af", fontStyle: "italic" }}>
                        {results?.isMissingGong ? "⚠ No Gong call recordings found — brief generated from Salesforce only." : "No prior calls on record."}
                      </div>
                    ) : account.gong.calls.map((c, i) => (
                      <div key={i} style={{ marginBottom: 14, paddingBottom: 14, borderBottom: i < account.gong.calls.length - 1 ? "1px solid #f3f4f6" : "none" }}>
                        <div style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                          <span style={{ fontSize: 12, fontWeight: 600, color: "#111827" }}>{c.date}</span>
                          <span className="badge" style={{ background: "#f3e8ff", color: "#7c3aed", fontSize: 10 }}>{c.duration}</span>
                          <span style={{ fontSize: 12, fontWeight: 600, color: sentimentColor(c.sentiment) }}>Sentiment {c.sentiment.toFixed(2)}</span>
                        </div>
                        <div style={{ fontSize: 11, color: "#9ca3af", marginBottom: 6 }}>{c.participants.join(" · ")}</div>
                        {c.highlights.map((h, j) => (
                          <div key={j} style={{ fontSize: 12, color: "#374151", padding: "3px 0 3px 10px", borderLeft: "2px solid #e5e7eb", marginBottom: 4, lineHeight: 1.5 }}>{h}</div>
                        ))}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {tab === "raw" && (
                <div>
                  <div style={{ fontSize: 11, color: "#6b7280", marginBottom: 10, padding: "8px 12px", background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 6, lineHeight: 1.6 }}>
                    The 4 prompts run as <strong>2 parallel API calls</strong> for speed — Steps 1+2 fire together, Steps 3+4 fire together. The JSON below is the raw output from each call before it is formatted into the brief above.
                  </div>
                  {[["Steps 1 & 2 — Data Extraction + Sentiment Analysis", "#7c3aed", results.history_analysis], ["Steps 3 & 4 — Recommendations + Compiled Brief", "#059669", results.recommendations]].map(([l, c, d]) => (
                    <div key={l} style={{ background: "white", border: "1px solid #e5e7eb", borderRadius: 8, padding: "14px 16px", marginBottom: 10 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: c, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 8 }}>{l}</div>
                      <pre style={{ fontSize: 11, color: "#6b7280", lineHeight: 1.7, overflow: "auto", whiteSpace: "pre-wrap", wordBreak: "break-word", fontFamily: "monospace" }}>{JSON.stringify(d, null, 2)}</pre>
                    </div>
                  ))}
                </div>
              )}


            </div>
          )}
        </div>
      </div>
    </div>
  );
}



    const loadingEl = document.getElementById('loading');
    if (loadingEl) loadingEl.style.display = 'none';
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
